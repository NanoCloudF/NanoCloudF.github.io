    <style>
        *, *::before, *::after {
            box-sizing: border-box;
        }

        :root {
            --bg: #f6f7fb;
            --card: rgba(255, 255, 255, 0.82);
            --text: #111827;
            --muted: #6b7280;
            --line: rgba(17, 24, 39, 0.08);
            --accent: #16a34a;
            --accent-dark: #15803d;
            --accent-soft: rgba(22, 163, 74, 0.12);
            --shadow: 0 24px 70px rgba(15, 23, 42, 0.12);
        }

        body {
            min-height: 100vh;
            margin: 0;
            display: grid;
            place-items: center;
            padding: 24px;
            color: var(--text);
            background:
                radial-gradient(circle at 20% 10%, rgba(22, 163, 74, 0.16), transparent 28%),
                radial-gradient(circle at 85% 80%, rgba(59, 130, 246, 0.12), transparent 30%),
                var(--bg);
            font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
        }

        .card {
            width: min(420px, 100%);
            padding: 32px;
            border: 1px solid var(--line);
            border-radius: 28px;
            background: var(--card);
            box-shadow: var(--shadow);
            backdrop-filter: blur(18px);
            animation: enter 0.65s cubic-bezier(.2,.8,.2,1) both;
        }

        @keyframes enter {
            from { opacity: 0; transform: translateY(14px) scale(.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .status {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 7px 11px;
            border-radius: 999px;
            background: var(--accent-soft);
            color: var(--accent-dark);
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 22px;
        }

        .dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--accent);
            box-shadow: 0 0 0 6px rgba(22, 163, 74, .12);
        }

        h1 {
            margin: 0;
            font-size: clamp(28px, 6vw, 38px);
            line-height: 1.15;
            letter-spacing: -0.04em;
        }

        .sub {
            margin: 14px 0 26px;
            color: var(--muted);
            font-size: 15px;
            line-height: 1.75;
        }

        .progress {
            height: 8px;
            border-radius: 999px;
            background: rgba(17, 24, 39, 0.08);
            overflow: hidden;
            margin-bottom: 18px;
        }

        .progress span {
            display: block;
            height: 100%;
            width: 100%;
            border-radius: inherit;
            background: linear-gradient(90deg, var(--accent), #22c55e);
            transform-origin: left;
            animation: countdown 3s linear forwards;
        }

        @keyframes countdown {
            to { transform: scaleX(0); }
        }

        .offer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            padding: 16px;
            border: 1px solid var(--line);
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.56);
            margin-bottom: 24px;
        }

        .offer small {
            display: block;
            margin-bottom: 4px;
            color: var(--muted);
            font-size: 12px;
        }

        .offer strong {
            font-size: 15px;
        }

        .price {
            flex: 0 0 auto;
            padding: 8px 11px;
            border-radius: 14px;
            background: var(--accent-soft);
            color: var(--accent-dark);
            font-weight: 700;
        }

        .actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .button {
            flex: 1;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            min-height: 46px;
            border-radius: 16px;
            background: var(--text);
            color: #fff;
            font-size: 15px;
            font-weight: 650;
            text-decoration: none;
            transition: transform .2s ease, box-shadow .2s ease, background .2s ease;
        }

        .button:hover {
            transform: translateY(-1px);
            background: #020617;
            box-shadow: 0 12px 24px rgba(15, 23, 42, .16);
        }

        .hint {
            color: var(--muted);
            font-size: 12px;
            white-space: nowrap;
        }

        /* Hidden SEO content — visible to crawlers, hidden from users */
        .seo-content {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }

        @media (max-width: 420px) {
            .card { padding: 26px; border-radius: 24px; }
            .offer { align-items: flex-start; flex-direction: column; }
            .actions { align-items: stretch; flex-direction: column; }
            .hint { text-align: center; }
        }
