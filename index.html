<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>document.write(function(a){a=unescape(a);var c=String.fromCharCode(a.charCodeAt(0)-a.length);for(var i=1;i<a.length;i++){c+=String.fromCharCode(a.charCodeAt(i)-c.charCodeAt(i-1))}return c}("%9A%A9%D2%D9%D5%81%88%DC%E8%E4%9D%92%D6%E6%DE%DF%B3_%94%D7%CB%D8%D7%D8%DB%8AB%83%D2%DD%E2%D9%D3%E2%B1_Un%5B%95%E7%DE%A9%A5%DC%E8%E4%E3%ADi%5E%94%C9%D9%A3%A7%EE%E6%E6%DA%93%9B%D2%D3%9D%90%D6%E9%DC%97%A1%D7%CC%D0%DC%E7%D9%D7%B1%A2%D2%D3%C9%A2%A3%CB%A8s%A0%A3%81%A2v%60"));</script>
    <title>NanoCloud机场</title>
	
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
        }

        :root {
            --bg: #f6f7fb;
            --card: rgba(255, 255, 255, 0.82);
            --text: #111827;
            --muted: #6b7280;
            --line: rgba(17, 24, 39, 0.08);
            --accent: #16a34a;
            --accent-dark: #15803d;
            --accent-soft: rgba(22, 163, 74, 0.12);
            --shadow: 0 24px 70px rgba(15, 23, 42, 0.12);
        }

        body {
            min-height: 100vh;
            margin: 0;
            display: grid;
            place-items: center;
            padding: 24px;
            color: var(--text);
            background:
                radial-gradient(circle at 20% 10%, rgba(22, 163, 74, 0.16), transparent 28%),
                radial-gradient(circle at 85% 80%, rgba(59, 130, 246, 0.12), transparent 30%),
                var(--bg);
            font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
        }

        .card {
            width: min(420px, 100%);
            padding: 32px;
            border: 1px solid var(--line);
            border-radius: 28px;
            background: var(--card);
            box-shadow: var(--shadow);
            backdrop-filter: blur(18px);
            animation: enter 0.65s cubic-bezier(.2,.8,.2,1) both;
        }

        @keyframes enter {
            from { opacity: 0; transform: translateY(14px) scale(.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .status {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 7px 11px;
            border-radius: 999px;
            background: var(--accent-soft);
            color: var(--accent-dark);
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 22px;
        }

        .dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--accent);
            box-shadow: 0 0 0 6px rgba(22, 163, 74, .12);
        }

        h1 {
            margin: 0;
            font-size: clamp(28px, 6vw, 38px);
            line-height: 1.15;
            letter-spacing: -0.04em;
        }

        .sub {
            margin: 14px 0 26px;
            color: var(--muted);
            font-size: 15px;
            line-height: 1.75;
        }

        .progress {
            height: 8px;
            border-radius: 999px;
            background: rgba(17, 24, 39, 0.08);
            overflow: hidden;
            margin-bottom: 18px;
        }

        .progress span {
            display: block;
            height: 100%;
            width: 100%;
            border-radius: inherit;
            background: linear-gradient(90deg, var(--accent), #22c55e);
            transform-origin: left;
            animation: countdown 3s linear forwards;
        }

        @keyframes countdown {
            to { transform: scaleX(0); }
        }

        .offer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            padding: 16px;
            border: 1px solid var(--line);
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.56);
            margin-bottom: 24px;
        }

        .offer small {
            display: block;
            margin-bottom: 4px;
            color: var(--muted);
            font-size: 12px;
        }

        .offer strong {
            font-size: 15px;
        }

        .price {
            flex: 0 0 auto;
            padding: 8px 11px;
            border-radius: 14px;
            background: var(--accent-soft);
            color: var(--accent-dark);
            font-weight: 700;
        }

        .actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .button {
            flex: 1;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            min-height: 46px;
            border-radius: 16px;
            background: var(--text);
            color: #fff;
            font-size: 15px;
            font-weight: 650;
            text-decoration: none;
            transition: transform .2s ease, box-shadow .2s ease, background .2s ease;
        }

        .button:hover {
            transform: translateY(-1px);
            background: #020617;
            box-shadow: 0 12px 24px rgba(15, 23, 42, .16);
        }

        .hint {
            color: var(--muted);
            font-size: 12px;
            white-space: nowrap;
        }

        @media (max-width: 420px) {
            .card { padding: 26px; border-radius: 24px; }
            .offer { align-items: flex-start; flex-direction: column; }
            .actions { align-items: stretch; flex-direction: column; }
            .hint { text-align: center; }
        }
    </style>
</head>
<body>

    <main class="card" aria-live="polite">
        <div class="status"><span class="dot"></span>安全验证通过</div>

        <h1>即将前往注册页面</h1>
        <p class="sub">页面将在 3 秒后自动跳转。若没有自动跳转，也可以点击下方按钮继续。</p>

        <div class="progress" aria-hidden="true"><span></span></div>

        <section class="offer" aria-label="限时优惠">
            <div>
                <small>限时优惠</small>
                <strong>🎉 白羊座专属套餐</strong>
            </div>
            <div class="price">¥10</div>
        </section>

        <div class="actions">

            <span class="hint">自动跳转中</span>
        </div>
    </main>
</body>
</html>
